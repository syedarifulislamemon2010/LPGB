name: Run Analysis Agent

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show files (DEBUG)
        run: |
          echo "Current directory:"
          pwd
          echo "All files:"
          ls -R
