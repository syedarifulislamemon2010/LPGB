    # 7️⃣ Upload artifact - Fixed path
    - name: Upload LPGB Cheat Sheet
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: LPGB_Cheat_Sheet
        path: |
          output/LPGB_Cheat_Sheet.pdf
          output/LPGB_Cheat_Sheet.md
          output/LPGB_Cheat_Sheet.txt
        if-no-files-found: warn

    # 8️⃣ Debug output (show what was generated)
