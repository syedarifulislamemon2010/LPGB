    # 6️⃣ Convert to PDF (optional)
    - name: Convert to PDF
      run: |
        sudo apt-get install -y pandoc texlive-xetex
        cd output
        pandoc LPGB_Cheat_Sheet.md -o LPGB_Cheat_Sheet.pdf --pdf-engine=xelatex || echo "PDF conversion skipped, markdown available"
