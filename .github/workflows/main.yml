name: LPGB Placeholder Workflow

on:
  push:
    branches:
      - main
      - copilot/upload-pdf-files
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build source-priority report
        run: |
          python - <<'PY'
          import json
          import pathlib
          import re
          import sys

          root = pathlib.Path(".")

          expected_original = ["law book.pdf"]
          expected_past = ["96-99.pdf", "5th.pdf", "6th.pdf"]

          missing = [f for f in expected_original + expected_past if not (root / f).exists()]
          if missing:
              print("Missing required files:", ", ".join(missing))
              sys.exit(1)

          all_content_files = sorted(
              str(p)
              for p in root.rglob("*")
              if p.is_file()
              and p.suffix.lower() in {".pdf", ".docx", ".html"}
              and ".git/" not in str(p)
          )

          normalized = {}
          for path in all_content_files:
              name = pathlib.Path(path).name.lower()
              key = re.sub(r"\s*\(\d+\)", "", pathlib.Path(name).stem)
              key = re.sub(r"[^a-z0-9]+", "", key)
              normalized.setdefault(key, []).append(path)

          duplicates = {k: v for k, v in normalized.items() if len(v) > 1}

          report = {
              "source_priority": {
                  "original_law": expected_original,
                  "past_questions": expected_past,
              },
              "validation": {
                  "required_files_present": True,
                  "total_content_files": len(all_content_files),
                  "duplicate_groups_found": len(duplicates),
              },
              "all_content_files": all_content_files,
              "duplicate_groups": duplicates,
          }

          pathlib.Path("analysis_report.json").write_text(
              json.dumps(report, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )

          summary_lines = [
              "# LPGB Source Validation",
              "",
              "## Source Priority",
              f"- Original law source: {', '.join(expected_original)}",
              f"- Past question sources: {', '.join(expected_past)}",
              "",
              "## Validation",
              f"- Required files present: ✅",
              f"- Total content files scanned: {len(all_content_files)}",
              f"- Duplicate groups found: {len(duplicates)}",
          ]
          pathlib.Path("analysis_summary.md").write_text(
              "\n".join(summary_lines) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LPGB_Analysis_Report
          path: |
            analysis_report.json
            analysis_summary.md
